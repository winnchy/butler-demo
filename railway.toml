# ================================================================
# Railway 双服务部署配置
# ================================================================
# Service 1 (mock-backend): 纯 API 服务器
#   - Railway 自动检测 mock_backend/Dockerfile
#   - Root Directory: mock_backend/
#   - 生成域名: https://mock-backend-xxx.up.railway.app
#
# Service 2 (butler-agent): OpenClaw Gateway + Chat Proxy
#   - 使用 agent/Dockerfile
#   - Root Directory: ./
#   - 环境变量:
#     PORT=8080
#     OPENAI_API_KEY=sk-xxx (DeepSeek API Key)
#     OPENAI_BASE_URL=https://api.deepseek.com/v1
#     BACKEND_URL=https://mock-backend-xxx.up.railway.app (Service 1 的公网URL)
#   - 生成域名: https://butler-agent-xxx.up.railway.app (评委访问此URL)
# ================================================================

[build]
builder = "DOCKERFILE"
# 不指定 dockerfilePath — 两个服务在 Railway UI 中各自手动配置
# Service 1: Dockerfile 路径 = mock_backend/Dockerfile
# Service 2: Dockerfile 路径 = agent/Dockerfile
